<section id="philosophy">
  <h2 class="title">The idea</h2>

  <div class="thesis">
    <p class="big-claim">
      The web already has a component format. <br />It's called <em>HTML</em>.
    </p>
    <p class="sub-claim">
      Spark's bet is that you shouldn't need a compiler, a bundle, or a
      framework runtime that reinvents the DOM just to make a counter count.
      A component is a file. State is a variable. An update is an assignment.
    </p>
  </div>

  <div class="compare">
    <template each="row in rows">
      <div class="row">
        <div class="them">
          <span class="lbl">the prevailing approach</span>
          <p>{row.them}</p>
        </div>
        <div class="us">
          <span class="lbl">⚡ spark</span>
          <p>{row.us}</p>
        </div>
      </div>
    </template>
  </div>

  <div class="receipts">
    <template each="r in receipts">
      <div class="receipt">
        <h4>{r.title}</h4>
        <p>{r.body}</p>
      </div>
    </template>
  </div>
</section>

<script>
  let rows = [
    { them: 'Your source code is compiled, transformed, and bundled before a browser ever sees it. Debugging means sourcemaps; deploying means a pipeline.',
      us: 'The file you write is the file that ships. View-source shows your actual component. Deploying is copying files to a static server.' },
    { them: 'Every update re-renders a virtual copy of your UI, diffs it against the previous copy, then reconciles the difference into the real DOM.',
      us: 'An assignment patches the real DOM directly — only the text nodes and attributes whose templates reference what changed. There is no copy.' },
    { them: 'Components are written in an invented dialect — special file extensions, special syntax, special imports — that only the toolchain understands.',
      us: 'Components are valid HTML with curly braces. If you can read a web page, you can read a Spark component. There is nothing new to unlearn.' },
    { them: 'Sharing state means contexts, providers, reducers, selectors, or an external state library with its own concepts and its own documentation.',
      us: 'A store is a named object. Components subscribe with one call. Assigning a property updates every subscriber. That is the entire API.' },
  ];

  let receipts = [
    { title: 'Zero-step builds',
      body: 'No install-compile-bundle loop between you and the browser. Save the file, refresh the page. Tooling like Vite is a convenience, never a requirement.' },
    { title: 'Nothing to age out',
      body: 'Frameworks churn; the platform compounds. Spark leans on fetch, Proxy, and templates — primitives the web has committed to forever. Your components don\'t expire with a major version.' },
    { title: 'A learning curve you\'ve already climbed',
      body: 'The entire mental model is HTML you know plus variables you know. Juniors are productive in an afternoon; the docs fit on one page.' },
    { title: 'Honest about its size',
      body: 'One small runtime file you can read in a coffee break. When you can audit every line of your framework, "magic" becomes "mechanism."' },
  ];
</script>
