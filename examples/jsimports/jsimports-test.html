<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spark JS Import — Test Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --font: "JetBrains Mono", ui-monospace, monospace; --bg: #0d0d0d; --text: #e0e0e0; --surface: #141414; --border: #222; --spark: #ffd24a; --muted: #777; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; padding: 32px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .hint { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
    .card h2 { font-size: 15px; color: var(--spark); margin-bottom: 4px; }
    code { background: #1a1a1a; color: var(--spark); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    button { font-family: inherit; font-size: 13px; cursor: pointer; padding: 6px 14px; border-radius: 6px; border: 1px solid #333; background: #111; color: var(--text); }
    button:hover { border-color: var(--spark); color: var(--spark); }
    .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    #results { margin-top: 20px; padding: 14px; background: #111; border: 1px solid #222; border-radius: 8px; }
    #results h2 { color: var(--spark); font-size: 15px; margin-bottom: 8px; }
    #results li { font-size: 13px; padding: 2px 0; list-style: none; }
    .summary { margin-top: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Spark JS Import — Interactive Tests</h1>
  <p class="hint">Each test imports JS modules in its <code>&lt;script&gt;</code> tag. Check the results below.</p>

  <div id="results"></div>

  <div data-test="basic"><div import="components/import-basic"></div></div>
  <div data-test="multiple"><div import="components/import-multiple"></div></div>
  <div data-test="default"><div import="components/import-default"></div></div>
  <div data-test="with-state"><div import="components/import-with-state"></div></div>
  <div data-test="derived"><div import="components/import-derived"></div></div>
  <div data-test="props"><div import="components/import-props" subject="Test"></div></div>
  <div data-test="async"><div import="components/import-async"></div></div>

  <script type="module">
    import { mount } from 'spark-html';

    const results = document.getElementById('results');
    const tests = [];
    let pass = 0, fail = 0;

    function test(name, fn) {
      tests.push({ name, fn });
    }

    function runTests() {
      results.innerHTML = '<h2>Test Results</h2>';
      const list = document.createElement('ul');
      results.appendChild(list);

      for (const { name, fn } of tests) {
        const li = document.createElement('li');
        try {
          fn();
          pass++;
          li.innerHTML = `<span class="pass">✓</span> ${name}`;
        } catch (e) {
          fail++;
          li.innerHTML = `<span class="fail">✗</span> ${name} — ${e.message}`;
        }
        list.appendChild(li);
      }

      const summary = document.createElement('p');
      summary.className = 'summary';
      summary.innerHTML = `<span class="pass">${pass} passed</span>${fail ? `, <span class="fail">${fail} failed</span>` : ''}`;
      results.appendChild(summary);
    }

    // Wait for mount to finish, then run assertions on the DOM
    await mount();

    // --- Tests ---

    function textOf(sel) {
      const el = document.querySelector(sel);
      if (!el) throw new Error(`selector "${sel}" not found`);
      return el.textContent.trim();
    }

    function hasText(sel, expected) {
      const actual = textOf(sel);
      if (!actual.includes(expected)) {
        throw new Error(`"${sel}" expected "${expected}" but got "${actual}"`);
      }
    }

    test('import-basic: capitalize works', () => {
      hasText('[data-test="basic"] p:last-child', 'Hello, Spark!');
    });

    test('import-multiple: add and multiply', () => {
      hasText('[data-test="multiple"]', '3 + 7 = 10');
      hasText('[data-test="multiple"]', '3 × 7 = 21');
      hasText('[data-test="multiple"]', '5 items');
    });

    test('import-default: named and default import', () => {
      hasText('[data-test="default"]', 'Hello, Spark!');
      hasText('[data-test="default"]', 'Hello, world!');
    });

    test('import-with-state: initial render', () => {
      hasText('[data-test="with-state"]', 'Count: 0');
      hasText('[data-test="with-state"]', '(times)');
    });

    test('import-derived: math derivations', () => {
      hasText('[data-test="derived"]', '6 × 7 = 42');
      hasText('[data-test="derived"]', '5! = 120');
    });

    test('import-props: prop value used with import', () => {
      hasText('[data-test="props"]', 'Hello, Test!');
    });

    test('import-async: async fetch resolves', async () => {
      // Wait for the async fetch to complete
      await new Promise(r => setTimeout(r, 300));
      hasText('[data-test="async"]', 'Hello, Spark Import!');
    });

    runTests();
  </script>
</body>
</html>
