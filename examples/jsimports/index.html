<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark JS Import Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --surface: #0a0a0a; --surface-2: #101014;
      --border: #1a1a1a; --border-strong: #333;
      --text: #fff; --muted: #888; --muted-dim: #555; --spark: #ffd24a;
      --font: "JetBrains Mono", ui-monospace, monospace;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    ::selection { background: var(--spark); color: #000; }
    .header { text-align: center; margin-bottom: 16px; }
    .header h1 { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .page { max-width: 800px; margin: 0 auto; padding: 56px 24px 96px; display: flex; flex-direction: column; gap: 40px; }
    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted-dim); margin-bottom: 8px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
    .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .hint { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    code { background: var(--surface-2); color: var(--spark); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .stack { display: flex; flex-direction: column; gap: 14px; }
    button { font-family: inherit; font-size: 14px; cursor: pointer; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text); }
    button:hover { border-color: var(--spark); color: var(--spark); }
    button.reset { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div import="components/app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
