<div class="card">
  <h2>Reactive statements</h2>
  <p class="hint">$: derived values recompute whenever state changes.</p>
  <p class="readout">{count} × 2 = <strong>{doubled}</strong> · squared = <strong>{squared}</strong> · {label}</p>
  <button onclick="{inc}">count++</button>
</div>

<script>
  let count = 2;

  $: doubled = count * 2;
  $: squared = count * count;
  $: label = squared > 25 ? 'getting big!' : 'still small';

  function inc() { count++; }
</script>

<style>
  .card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; }
  h2 { margin-bottom: 6px; }
  .hint { font-size: 13px; color: #888; margin-bottom: 14px; }
  .readout { font-size: 15px; margin-bottom: 14px; font-variant-numeric: tabular-nums; }
  .readout strong { color: #5b4ff7; }
  button {
    padding: 8px 20px; border: 1px solid #ddd; border-radius: 7px;
    background: #fafafa; font-size: 14px; cursor: pointer; font-family: inherit;
  }
  button:hover { background: #f0eeff; border-color: #5b4ff7; }
</style>
