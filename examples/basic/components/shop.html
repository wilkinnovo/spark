<div class="card">
  <h2>Shop <span class="badge">writes to store</span></h2>
  <div class="items">
    <template each="item in catalog">
      <button class="item" onclick="{addToCart}" :data-name="item.name" :data-price="item.price">
        {item.emoji} {item.name} — ${item.price}
      </button>
    </template>
  </div>
</div>

<script>
  const cart = useStore('cart');

  let catalog = [
    { emoji: '☕', name: 'Coffee', price: 4 },
    { emoji: '🥐', name: 'Croissant', price: 3 },
    { emoji: '🍰', name: 'Cake', price: 6 },
  ];

  function addToCart(event) {
    const { name, price } = event.target.dataset;
    cart.items = [...cart.items, name];
    cart.total = cart.total + Number(price);
  }
</script>

<style>
  .card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; }
  h2 { margin-bottom: 14px; }
  .badge { font-size: 11px; font-weight: 400; color: #5b4ff7; background: #f0eeff; padding: 2px 8px; border-radius: 10px; vertical-align: middle; }
  .items { display: flex; gap: 8px; flex-wrap: wrap; }
  .item {
    padding: 10px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafafa;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background .12s;
  }
  .item:hover { background: #f0eeff; border-color: #5b4ff7; }
</style>
