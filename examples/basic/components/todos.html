<div class="card">
  <h2>Todos ({remaining})</h2>

  <div class="input-group">
    <input type="text" bind:value="input" placeholder="Enter a new todo" />
    <button :disabled="!input.trim()" onclick="{addTodo}">Add</button>
    <button class="reset" onclick="{reset}">Reset</button>
  </div>

  <ul class="todos">
    <template each="todo, i in todos">
      <li class="todo">
        <span>{i + 1}. {todo}</span>
        <button class="remove" onclick="{removeAt}" :data-index="i">✕</button>
      </li>
    </template>
  </ul>
  <p class="empty" :hidden="todos.length > 0">Nothing here. Add your first todo above.</p>
</div>

<script>
  let todos = ['Buy groceries', 'Walk the dog', 'Read a book'];
  let input = '';
  $: remaining = todos.length + (todos.length === 1 ? ' item' : ' items');

  function addTodo() {
    if (!input.trim()) return;
    todos = [...todos, input.trim()];
    input = '';
  }
  function removeAt(event) {
    const i = Number(event.target.dataset.index);
    todos = todos.filter((_, idx) => idx !== i);
  }
  function reset() {
    todos = [];
    input = '';
  }
</script>

<style>
  .card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 20px;
  }
  h2 { margin-bottom: 14px; }
  .input-group { display: flex; gap: 10px; }
  input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
  }
  button {
    padding: 8px 20px;
    border: 1px solid #ddd;
    border-radius: 7px;
    background: #fafafa;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background .12s;
  }
  button:hover { background: #f0eeff; border-color: #5b4ff7; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .reset { color: #c0392b; }
  .todos { list-style: none; padding: 0; margin-top: 14px; }
  .todo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid #eee;
  }
  .todo:last-child { border-bottom: none; }
  .remove {
    padding: 2px 8px;
    font-size: 11px;
    color: #bbb;
    border: none;
    background: none;
  }
  .remove:hover { color: #c0392b; background: none; border: none; }
  .empty { font-size: 13px; color: #aaa; margin-top: 12px; text-align: center; }
</style>
