<div class="card">
  <h2>Timer: {seconds}s</h2>
  <p class="hint">setInterval mutating proxy state — async updates work too.</p>
  <div class="row">
    <button :disabled="running" onclick="{start}">Start</button>
    <button :disabled="!running" onclick="{stop}">Stop</button>
    <button class="reset" onclick="{reset}">Reset</button>
  </div>
</div>

<script>
  let seconds = 0;
  let running = false;
  let handle = null;

  function start() {
    if (running) return;
    running = true;
    handle = setInterval(() => { seconds++; }, 1000);
  }
  function stop() {
    running = false;
    clearInterval(handle);
  }
  function reset() {
    stop();
    seconds = 0;
  }
</script>

<style>
  .card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 20px;
  }
  h2 { margin-bottom: 6px; font-variant-numeric: tabular-nums; }
  .hint { font-size: 13px; color: #888; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; }
  button {
    padding: 8px 20px;
    border: 1px solid #ddd;
    border-radius: 7px;
    background: #fafafa;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background .12s;
  }
  button:hover { background: #f0eeff; border-color: #5b4ff7; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .reset { color: #999; margin-left: auto; }
</style>
