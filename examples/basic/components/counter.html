<div class="card">
  <h2>Counter: {count}</h2>
  <p class="hint">Buttons mutate state, DOM re-patches automatically.</p>
  <div class="row">
    <button onclick="{decrement}">−</button>
    <button onclick="{increment}">+</button>
    <button :disabled="count === 0" class="reset" onclick="{reset}">Reset</button>
  </div>
</div>

<script>
  let count = 0;
  function increment() { count++; }
  function decrement() { count--; }
  function reset()     { count = 0; }
</script>

<style>
  .card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 20px;
  }
  h2 { margin-bottom: 6px; }
  .hint { font-size: 13px; color: #888; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; }
  button {
    padding: 8px 20px;
    border: 1px solid #ddd;
    border-radius: 7px;
    background: #fafafa;
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
    transition: background .12s;
  }
  button:hover { background: #f0eeff; border-color: #5b4ff7; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .reset { font-size: 13px; color: #999; margin-left: auto; }
</style>
